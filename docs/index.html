<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TweetFit Settings</title>
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #f5f5f5; color: #000;
    margin: 0; padding: 24px 16px; max-width: 420px; margin-inline: auto;
  }
  @media (prefers-color-scheme: dark) {
    body { background: #121212; color: #eee; }
    input { background: #1e1e1e; color: #eee; border-color: #444 !important; }
    .sub { color: #eee !important; }
    .card, .card label, .card .hint { color: #000 !important; }
  }
  h1 { font-size: 24px; margin: 0 0 4px; }
  .sub { color: #000; margin: 0 0 24px; }
  .card { background: #fff; border-radius: 12px; padding: 16px; box-shadow: 0 1px 3px rgba(0,0,0,.12); }
  label { display: block; font-weight: 600; font-size: 14px; margin-bottom: 6px; color: #000; }
  input {
    width: 100%; padding: 10px 12px; font-size: 15px;
    border: 1px solid #ccc; border-radius: 8px;
  }
  .hint { font-size: 12px; color: #000; margin: 6px 0 16px; }
  button {
    width: 100%; padding: 12px; font-size: 16px; font-weight: 600;
    border: 0; border-radius: 8px; cursor: pointer; margin-top: 8px;
  }
  .primary { background: #1d9bf0; color: #fff; }
  #msg { margin-top: 16px; font-size: 14px; text-align: center; min-height: 20px; }
  .warn { color: #b45309; }
</style>
</head>
<body>
  <h1>TweetFit</h1>
  <p class="sub">X client for Pebble</p>

  <div class="card">
    <label for="server_url">Server URL</label>
    <input id="server_url" placeholder="https://your-app.vercel.app"
           autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false"
           inputmode="url">
    <p class="hint">The address of your TweetFit scraper server (see the <b>server/</b> folder).</p>

    <label for="secret">Pairing code</label>
    <input id="secret" placeholder="e.g. 123456" inputmode="numeric"
           autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false">
    <p class="hint">The 6-digit code shown on your server's setup page (just open the
      server URL in a browser). Leave blank to keep the current pairing.</p>

    <button id="save" class="primary">Save</button>
  </div>
  <div id="msg"></div>

<script>
(function () {
  function qs(name) {
    var m = new RegExp('[?&]' + name + '=([^&]*)').exec(location.search);
    return m ? decodeURIComponent(m[1].replace(/\+/g, ' ')) : null;
  }
  function setMsg(text, cls) {
    var el = document.getElementById('msg');
    el.textContent = text; el.className = cls || '';
  }

  var returnTo = qs('return_to') || 'pebblejs://close#';
  document.getElementById('server_url').value = qs('server_url') || '';
  if (qs('has_token') === '1') {
    document.getElementById('secret').placeholder = '•••••• (unchanged)';
  }

  function finish(serverUrl, token) {
    var payload = { action: 'save', serverUrl: serverUrl };
    if (token) payload.token = token;
    location.href = returnTo + encodeURIComponent(JSON.stringify(payload));
  }

  // Exchange the one-time pairing code (shown by the server's /setup page)
  // for the real access token. XMLHttpRequest for old Pebble app webviews.
  function exchangeCode(serverUrl, code, onToken) {
    var xhr = new XMLHttpRequest();
    xhr.open('POST', serverUrl.replace(/\/+$/, '') + '/api/pair');
    xhr.setRequestHeader('Content-Type', 'application/json');
    xhr.timeout = 10000;
    xhr.onload = function () {
      var body = null;
      try { body = JSON.parse(xhr.responseText); } catch (e) {}
      if (xhr.status === 200 && body && body.app_token) {
        onToken(body.app_token);
      } else {
        setMsg('Invalid or expired pairing code — open your server\'s setup page ' +
          'for a fresh one.', 'warn');
      }
    };
    xhr.onerror = xhr.ontimeout = function () {
      setMsg('Could not reach the server — check the URL.', 'warn');
    };
    xhr.send(JSON.stringify({ code: code }));
  }

  document.getElementById('save').addEventListener('click', function () {
    var serverUrl = document.getElementById('server_url').value.trim();
    var secret = document.getElementById('secret').value.trim();
    if (!serverUrl) { setMsg('Enter your server URL.', 'warn'); return; }
    if (!/^https?:\/\//.test(serverUrl)) { setMsg('URL must start with https://', 'warn'); return; }
    setMsg('Saving…');
    // 6 digits (spaces/dashes ignored) is a pairing code to exchange; any
    // other non-blank input is silently treated as a full access token
    // (legacy env-var setups); blank keeps the current token.
    var asCode = secret.replace(/[\s-]/g, '');
    if (/^\d{6}$/.test(asCode)) {
      exchangeCode(serverUrl, asCode, function (fetched) { finish(serverUrl, fetched); });
    } else {
      finish(serverUrl, secret);
    }
  });
})();
</script>
</body>
</html>
